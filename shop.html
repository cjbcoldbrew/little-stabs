<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shop — Little Stabs</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="fabric-noise" aria-hidden="true"></div>
  <header class="site-header">
    <nav class="nav">
      <a class="mark" href="index.html"><span class="stitched-box">×</span></a>
      <div class="nav-links">
        <a href="shop.html">Shop</a>
        <a href="index.html#drops">Drops</a>
        <a href="about.html">About</a>
        <a href="index.html#journal">Journal</a>
        <a href="index.html#newsletter">Contact</a>
      </div>
      <a class="cart" href="#">Cart (0)</a>
    </nav>
    <section class="page-hero">
      <div>
        <img class="logo-image" src="assets/little-stabs-logo.png" alt="Little Stabs stitched logo" />
        <h1>Small batch drops.</h1>
        <p>Digital patterns first. Physical stitched goods when the thread allows.</p>

  <main class="product-strip">

      <h2>Boro Chore Jacket</h2>

    <article class="product-card">
      <div class="product-image tote" aria-hidden="true"></div>
      <h2>Sashiko Tote</h2>
      <div class="product-meta"><span>003 / 50</span><span>$78</span></div>

    <article class="product-card">
      <div class="product-image cap" aria-hidden="true"></div>
      <h2>Signal Cap</h2>
      <div class="product-meta"><span>002 / 40</span><span>$52</span></div>
    </article>
    <article class="product-card">
      <div class="product-image kit">
        <img src="assets/sashiko-samples.jpg" alt="Blue and white sashiko stitched fabric samples" />
      </div>
      <h2>Visible Mending Kit</h2>
      <div class="product-meta"><span>Limited</span><span>$36</span></div>
    </article>
  </main>
